<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">System Database Overview</title>
  <desc id="desc">Overview diagram for the Supabase database tables used by the platform.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#36516f"/>
    </marker>
    <style>
      .bg { fill: #f7fafc; }
      .title { font: 700 34px Arial, Segoe UI, sans-serif; fill: #273347; }
      .subtitle { font: 400 17px Arial, Segoe UI, sans-serif; fill: #5d6b7d; }
      .section { fill: #ffffff; stroke: #d8e3ef; stroke-width: 2; rx: 12; }
      .section-blue { fill: #edf5ff; stroke: #9fc3e6; stroke-width: 2; rx: 12; }
      .section-green { fill: #effaf3; stroke: #9bd6ad; stroke-width: 2; rx: 12; }
      .section-yellow { fill: #fff8e6; stroke: #e6c86f; stroke-width: 2; rx: 12; }
      .section-rose { fill: #fff1f3; stroke: #e6a0ad; stroke-width: 2; rx: 12; }
      .head { font: 700 20px Arial, Segoe UI, sans-serif; fill: #273347; }
      .text { font: 400 15px Arial, Segoe UI, sans-serif; fill: #34475f; }
      .small { font: 400 13px Arial, Segoe UI, sans-serif; fill: #5d6b7d; }
      .line { stroke: #36516f; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #9eb1c6; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .tag { fill: #273347; rx: 13; }
      .tag-text { font: 700 13px Arial, Segoe UI, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1100"/>
  <text class="title" x="80" y="75">System Database Overview</text>
  <text class="subtitle" x="80" y="108">Supabase Authentication + PostgreSQL tables used in the small-business wholesale platform.</text>

  <rect class="section-blue" x="615" y="145" width="370" height="120"/>
  <text class="head" x="650" y="185">auth.users</text>
  <text class="text" x="650" y="214">id, email, encrypted password</text>
  <text class="text" x="650" y="239">created_at, last_sign_in_at</text>

  <rect class="section-blue" x="585" y="330" width="430" height="178"/>
  <text class="head" x="620" y="370">profiles</text>
  <text class="text" x="620" y="400">id, full_name, email, phone</text>
  <text class="text" x="620" y="426">country, city, area, village</text>
  <text class="text" x="620" y="452">account_type, status, bio</text>
  <text class="text" x="620" y="478">preferred_currency, social_links</text>

  <path class="line" d="M 800 265 L 800 330"/>
  <text class="small" x="822" y="306">1:1</text>

  <rect class="section" x="70" y="595" width="310" height="165"/>
  <text class="head" x="100" y="635">supplier_profiles</text>
  <text class="text" x="100" y="664">user_id, store_name</text>
  <text class="text" x="100" y="690">product_category, store_link</text>
  <text class="text" x="100" y="716">commercial_reg_no</text>
  <text class="text" x="100" y="742">shipping_company_id</text>

  <rect class="section" x="440" y="595" width="310" height="165"/>
  <text class="head" x="470" y="635">small_business_profiles</text>
  <text class="text" x="470" y="664">user_id, project_name</text>
  <text class="text" x="470" y="690">project_field, project_stage</text>
  <text class="text" x="470" y="716">needs, social_link</text>

  <rect class="section" x="810" y="595" width="330" height="165"/>
  <text class="head" x="840" y="635">shipping_company_profiles</text>
  <text class="text" x="840" y="664">user_id, company_name</text>
  <text class="text" x="840" y="690">delivery_scope, delivery_cities</text>
  <text class="text" x="840" y="716">avg_delivery_time, license_no</text>

  <rect class="section" x="1200" y="595" width="310" height="165"/>
  <text class="head" x="1230" y="635">supporter_profiles</text>
  <text class="text" x="1230" y="664">user_id, support_type</text>
  <text class="text" x="1230" y="690">funding_range, interests</text>
  <text class="text" x="1230" y="716">professional_link</text>
  <text class="text" x="1230" y="742">previous_experience</text>

  <path class="soft-line" d="M 635 508 C 520 555, 390 575, 250 595"/>
  <path class="soft-line" d="M 740 508 C 690 550, 640 575, 595 595"/>
  <path class="soft-line" d="M 870 508 C 925 550, 958 575, 975 595"/>
  <path class="soft-line" d="M 975 508 C 1105 555, 1230 575, 1355 595"/>

  <rect class="section-green" x="70" y="835" width="300" height="170"/>
  <text class="head" x="100" y="875">products</text>
  <text class="text" x="100" y="904">supplier_id, name, description</text>
  <text class="text" x="100" y="930">wholesale_price, currency</text>
  <text class="text" x="100" y="956">stock_quantity, category</text>
  <text class="text" x="100" y="982">is_published, ratings</text>

  <rect class="section-green" x="410" y="835" width="275" height="170"/>
  <text class="head" x="440" y="875">product_images</text>
  <text class="text" x="440" y="904">product_id, image_url</text>
  <text class="text" x="440" y="930">is_primary</text>
  <text class="head" x="440" y="968">product_ratings</text>
  <text class="text" x="440" y="994">product_id, user_id, rating</text>

  <rect class="section-yellow" x="725" y="835" width="335" height="170"/>
  <text class="head" x="755" y="875">cart and favorites</text>
  <text class="text" x="755" y="904">carts: user_id</text>
  <text class="text" x="755" y="930">cart_items: cart_id, product_id</text>
  <text class="text" x="755" y="956">favorites: user_id, product_id</text>
  <text class="text" x="755" y="982">product_views: user_id, product_id</text>

  <rect class="section-yellow" x="1100" y="835" width="410" height="170"/>
  <text class="head" x="1130" y="875">orders and payments</text>
  <text class="text" x="1130" y="904">orders: buyer_id, supplier_id, status</text>
  <text class="text" x="1130" y="930">order_items: order_id, product_id</text>
  <text class="text" x="1130" y="956">payments: order_id, payment_status</text>
  <text class="text" x="1130" y="982">transactions: payment_id</text>

  <path class="soft-line" d="M 225 760 L 225 835"/>
  <path class="soft-line" d="M 595 760 C 670 790, 805 800, 890 835"/>
  <path class="soft-line" d="M 975 760 C 1080 800, 1195 805, 1305 835"/>

  <path class="soft-line" d="M 370 920 L 410 920"/>
  <path class="soft-line" d="M 685 920 L 725 920"/>
  <path class="soft-line" d="M 1060 920 L 1100 920"/>

  <rect class="section-rose" x="70" y="145" width="410" height="220"/>
  <text class="head" x="100" y="185">registration and approval</text>
  <text class="text" x="100" y="214">applications: user_id, account_type</text>
  <text class="text" x="100" y="240">data_json, proof_json, status</text>
  <text class="text" x="100" y="266">ai_score, ai_recommendation, ai_risk</text>
  <text class="text" x="100" y="292">admin_reviews: decision, reason</text>
  <text class="text" x="100" y="318">verification_files: application_id</text>

  <rect class="section-rose" x="1120" y="145" width="390" height="220"/>
  <text class="head" x="1150" y="185">communication and support</text>
  <text class="text" x="1150" y="214">direct_conversations</text>
  <text class="text" x="1150" y="240">direct_messages</text>
  <text class="text" x="1150" y="266">support_tickets, ticket_messages</text>
  <text class="text" x="1150" y="292">notifications</text>
  <text class="text" x="1150" y="318">ai_chat_sessions, ai_chat_messages</text>

  <path class="soft-line" d="M 480 255 C 535 250, 575 220, 615 205"/>
  <path class="soft-line" d="M 985 205 C 1030 220, 1080 250, 1120 255"/>

  <rect class="tag" x="650" y="540" width="300" height="35"/>
  <text class="tag-text" x="683" y="563">Role tables depend on account_type</text>
</svg>
