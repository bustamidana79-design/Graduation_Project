<svg xmlns="http://www.w3.org/2000/svg" width="1550" height="980" viewBox="0 0 1550 980" role="img" aria-labelledby="title desc">
  <title id="title">Field 5 Product Number</title>
  <desc id="desc">Product number field showing product ID as primary key and relationships with related tables.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#36516f"/>
    </marker>
    <style>
      .bg{fill:#f7fafc}.title{font:700 34px Arial,sans-serif;fill:#273347}.subtitle{font:400 17px Arial,sans-serif;fill:#5d6b7d}
      .center{fill:#edf5ff;stroke:#8eb9e3;stroke-width:2.5;rx:16}.box{fill:#fff;stroke:#d8e3ef;stroke-width:2;rx:14}.other{fill:#fff8e6;stroke:#e3c466;stroke-width:2;rx:14}
      .head{font:700 21px Arial,sans-serif;fill:#273347}.text{font:400 16px Arial,sans-serif;fill:#34475f}.small{font:400 13px Arial,sans-serif;fill:#637184}
      .line{stroke:#36516f;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.tag{fill:#273347;rx:16}.tagText{font:700 14px Arial,sans-serif;fill:#fff}
    </style>
  </defs>
  <rect class="bg" width="1550" height="980"/>
  <text class="title" x="70" y="75">Field (5): Product Number Field</text>
  <text class="subtitle" x="70" y="108">Each product has a unique product ID that connects it with all related actions and records.</text>

  <rect class="center" x="610" y="360" width="330" height="165"/>
  <text class="head" x="665" y="405">products.id</text>
  <text class="text" x="665" y="440">Unique Product ID</text>
  <text class="text" x="665" y="470">Primary key</text>
  <text class="small" x="665" y="500">Used as product_id in other fields</text>

  <rect class="box" x="85" y="220" width="255" height="110"/>
  <text class="head" x="120" y="262">product_images</text>
  <text class="text" x="120" y="294">product_id</text>

  <rect class="box" x="85" y="600" width="255" height="110"/>
  <text class="head" x="120" y="642">product_ratings</text>
  <text class="text" x="120" y="674">product_id</text>

  <rect class="box" x="410" y="125" width="255" height="110"/>
  <text class="head" x="445" y="167">cart_items</text>
  <text class="text" x="445" y="199">product_id</text>

  <rect class="box" x="410" y="745" width="255" height="110"/>
  <text class="head" x="445" y="787">favorites</text>
  <text class="text" x="445" y="819">product_id</text>

  <rect class="box" x="885" y="125" width="255" height="110"/>
  <text class="head" x="920" y="167">order_items</text>
  <text class="text" x="920" y="199">product_id</text>

  <rect class="box" x="885" y="745" width="255" height="110"/>
  <text class="head" x="920" y="787">product_views</text>
  <text class="text" x="920" y="819">product_id</text>

  <rect class="other" x="1210" y="330" width="255" height="200"/>
  <text class="head" x="1245" y="372">Other IDs</text>
  <text class="text" x="1245" y="404">orders.id</text>
  <text class="text" x="1245" y="432">payments.id</text>
  <text class="text" x="1245" y="460">delivery_orders.id</text>
  <text class="text" x="1245" y="488">investments.id</text>

  <path class="line" d="M610 405 C480 340 415 290 340 275"/>
  <path class="line" d="M610 445 C465 475 430 620 340 655"/>
  <path class="line" d="M705 360 C650 285 595 245 538 235"/>
  <path class="line" d="M705 525 C650 620 595 710 538 745"/>
  <path class="line" d="M850 360 C900 285 950 245 1012 235"/>
  <path class="line" d="M850 525 C910 625 960 710 1012 745"/>
  <path class="line" d="M940 440 L1210 430"/>

  <rect class="tag" x="680" y="600" width="190" height="36"/>
  <text class="tagText" x="713" y="623">Field (5)</text>
</svg>
