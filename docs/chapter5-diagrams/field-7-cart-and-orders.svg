<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1100" viewBox="0 0 1700 1100" role="img" aria-labelledby="title desc">
  <title id="title">Field 7 Cart and Orders</title>
  <desc id="desc">Cart and orders field showing carts, cart items, orders, order items, and payments.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#36516f"/>
    </marker>
    <style>
      .bg{fill:#f7fafc}.title{font:700 34px Arial,sans-serif;fill:#273347}.subtitle{font:400 17px Arial,sans-serif;fill:#5d6b7d}
      .box{fill:#fff;stroke:#d8e3ef;stroke-width:2;rx:14}.cart{fill:#fff8e6;stroke:#e3c466;stroke-width:2.5;rx:14}.order{fill:#edf5ff;stroke:#8eb9e3;stroke-width:2.5;rx:14}.pay{fill:#effaf3;stroke:#91d1a5;stroke-width:2;rx:14}
      .head{font:700 21px Arial,sans-serif;fill:#273347}.text{font:400 15px Arial,sans-serif;fill:#34475f}.small{font:400 13px Arial,sans-serif;fill:#637184}
      .line{stroke:#36516f;stroke-width:2.35;fill:none;marker-end:url(#arrow)}.soft{stroke:#9eb1c6;stroke-width:1.8;fill:none;marker-end:url(#arrow)}
      .tag{fill:#273347;rx:16}.tagText{font:700 14px Arial,sans-serif;fill:#fff}
    </style>
  </defs>
  <rect class="bg" width="1700" height="1100"/>
  <text class="title" x="70" y="75">Field (7): Cart and Orders Field</text>
  <text class="subtitle" x="70" y="108">The shopping cart stores selected products before checkout; checkout creates orders and order items.</text>

  <rect class="box" x="80" y="190" width="290" height="150"/>
  <text class="head" x="115" y="232">Small Business User</text>
  <text class="text" x="115" y="264">profiles.id</text>
  <text class="text" x="115" y="292">buyer_id after checkout</text>

  <rect class="cart" x="470" y="155" width="290" height="190"/>
  <text class="head" x="505" y="198">carts</text>
  <text class="text" x="505" y="232">id: Cart ID</text>
  <text class="text" x="505" y="262">user_id</text>
  <text class="small" x="505" y="298">One active cart for the buyer.</text>

  <rect class="cart" x="850" y="155" width="310" height="220"/>
  <text class="head" x="885" y="198">cart_items</text>
  <text class="text" x="885" y="232">id: Cart Item ID</text>
  <text class="text" x="885" y="262">cart_id</text>
  <text class="text" x="885" y="292">product_id</text>
  <text class="text" x="885" y="322">quantity</text>

  <rect class="box" x="1250" y="190" width="290" height="150"/>
  <text class="head" x="1285" y="232">products</text>
  <text class="text" x="1285" y="264">id: Product ID</text>
  <text class="text" x="1285" y="292">price and stock checked</text>

  <rect class="order" x="470" y="585" width="370" height="300"/>
  <text class="head" x="515" y="628">orders</text>
  <text class="text" x="515" y="662">id: Order ID</text>
  <text class="text" x="515" y="690">buyer_id, supplier_id</text>
  <text class="text" x="515" y="718">shipping_company_id</text>
  <text class="text" x="515" y="746">phone, country, city, area</text>
  <text class="text" x="515" y="774">address_text, shipping_cost</text>
  <text class="text" x="515" y="802">status, subtotal, total_amount</text>
  <text class="text" x="515" y="830">currency, notes, created_at</text>

  <rect class="order" x="930" y="585" width="310" height="240"/>
  <text class="head" x="965" y="628">order_items</text>
  <text class="text" x="965" y="662">id: Order Item ID</text>
  <text class="text" x="965" y="690">order_id</text>
  <text class="text" x="965" y="718">product_id</text>
  <text class="text" x="965" y="746">quantity</text>
  <text class="text" x="965" y="774">unit_price, total_price</text>
  <text class="text" x="965" y="802">currency</text>

  <rect class="pay" x="1320" y="585" width="290" height="210"/>
  <text class="head" x="1355" y="628">payments</text>
  <text class="text" x="1355" y="662">order_id</text>
  <text class="text" x="1355" y="690">payment_provider</text>
  <text class="text" x="1355" y="718">payment_status</text>
  <text class="text" x="1355" y="746">currency</text>

  <path class="line" d="M370 265 L470 250"/>
  <path class="line" d="M760 250 L850 250"/>
  <path class="line" d="M1160 265 L1250 265"/>
  <path class="line" d="M1005 375 C950 475 805 530 655 585"/>
  <path class="line" d="M840 735 L930 720"/>
  <path class="line" d="M1240 700 L1320 690"/>
  <path class="soft" d="M655 585 C575 500 565 420 615 345"/>
  <rect class="tag" x="760" y="500" width="190" height="36"/>
  <text class="tagText" x="793" y="523">Field (7)</text>
</svg>
