<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">Field 4 Edit Product Information</title>
  <desc id="desc">Edit product information field showing supplier changes stored in the products table.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#36516f"/>
    </marker>
    <style>
      .bg{fill:#f7fafc}.title{font:700 34px Arial,sans-serif;fill:#273347}.subtitle{font:400 17px Arial,sans-serif;fill:#5d6b7d}
      .box{fill:#fff;stroke:#d8e3ef;stroke-width:2;rx:14}.edit{fill:#fff8e6;stroke:#e3c466;stroke-width:2.5;rx:14}.ok{fill:#effaf3;stroke:#91d1a5;stroke-width:2;rx:14}
      .head{font:700 22px Arial,sans-serif;fill:#273347}.text{font:400 16px Arial,sans-serif;fill:#34475f}.small{font:400 13px Arial,sans-serif;fill:#637184}
      .line{stroke:#36516f;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.tag{fill:#273347;rx:16}.tagText{font:700 14px Arial,sans-serif;fill:#fff}
    </style>
  </defs>
  <rect class="bg" width="1500" height="900"/>
  <text class="title" x="70" y="75">Field (4): Edit Product Information Field</text>
  <text class="subtitle" x="70" y="108">Supplier edits update the existing product row and then recalculate product visibility.</text>

  <rect class="box" x="80" y="230" width="300" height="170"/>
  <text class="head" x="115" y="272">Existing Product</text>
  <text class="text" x="115" y="306">products.id</text>
  <text class="text" x="115" y="334">supplier_id</text>
  <text class="text" x="115" y="362">current product data</text>

  <rect class="edit" x="510" y="170" width="410" height="300"/>
  <text class="head" x="555" y="214">Editable Fields</text>
  <text class="text" x="555" y="252">Product name</text>
  <text class="text" x="555" y="282">Description</text>
  <text class="text" x="555" y="312">Wholesale price</text>
  <text class="text" x="555" y="342">Currency</text>
  <text class="text" x="555" y="372">Category</text>
  <text class="text" x="555" y="402">Minimum order quantity</text>
  <text class="text" x="555" y="432">Stock quantity</text>

  <rect class="box" x="1050" y="170" width="330" height="170"/>
  <text class="head" x="1085" y="214">Update products</text>
  <text class="text" x="1085" y="252">Same product ID</text>
  <text class="text" x="1085" y="282">Same supplier owner</text>
  <text class="small" x="1085" y="312">No new product row is created.</text>

  <rect class="ok" x="1050" y="470" width="330" height="180"/>
  <text class="head" x="1085" y="514">Publishing Status</text>
  <text class="text" x="1085" y="552">is_published = true when:</text>
  <text class="text" x="1085" y="582">stock quantity is above 0</text>
  <text class="text" x="1085" y="612">and product has images</text>

  <path class="line" d="M380 315 L510 315"/>
  <path class="line" d="M920 255 L1050 255"/>
  <path class="line" d="M1215 340 L1215 470"/>
  <rect class="tag" x="675" y="595" width="190" height="36"/>
  <text class="tagText" x="708" y="618">Field (4)</text>
</svg>
