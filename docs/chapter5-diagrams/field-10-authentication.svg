<svg xmlns="http://www.w3.org/2000/svg" width="1450" height="850" viewBox="0 0 1450 850" role="img" aria-labelledby="title desc">
  <title id="title">Authentication</title>
  <desc id="desc">Authentication diagram showing Supabase Auth user connected to profiles and dashboard access.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#36516f"/>
    </marker>
    <style>
      .bg{fill:#f7fafc}.title{font:700 34px Arial,sans-serif;fill:#273347}.subtitle{font:400 17px Arial,sans-serif;fill:#5d6b7d}
      .auth{fill:#edf5ff;stroke:#8eb9e3;stroke-width:2.5;rx:14}.prof{fill:#effaf3;stroke:#91d1a5;stroke-width:2.5;rx:14}.dash{fill:#fff8e6;stroke:#e3c466;stroke-width:2;rx:14}.box{fill:#fff;stroke:#d8e3ef;stroke-width:2;rx:14}
      .head{font:700 22px Arial,sans-serif;fill:#273347}.text{font:400 16px Arial,sans-serif;fill:#34475f}.small{font:400 13px Arial,sans-serif;fill:#637184}
      .line{stroke:#36516f;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.tag{fill:#273347;rx:16}.tagText{font:700 14px Arial,sans-serif;fill:#fff}
    </style>
  </defs>
  <rect class="bg" width="1450" height="850"/>
  <text class="title" x="70" y="75">5.11 Authentication</text>
  <text class="subtitle" x="70" y="108">Supabase Authentication stores login data and connects each auth user to a profile using the same UID.</text>

  <rect class="auth" x="90" y="230" width="340" height="270"/>
  <text class="head" x="130" y="274">Supabase Auth</text>
  <text class="text" x="130" y="312">User UID</text>
  <text class="text" x="130" y="342">Email</text>
  <text class="text" x="130" y="372">Password auth data</text>
  <text class="text" x="130" y="402">Email confirmation status</text>
  <text class="text" x="130" y="432">Date of registration</text>
  <text class="text" x="130" y="462">Last sign-in date</text>

  <rect class="prof" x="560" y="230" width="340" height="270"/>
  <text class="head" x="600" y="274">profiles</text>
  <text class="text" x="600" y="312">id = Auth User UID</text>
  <text class="text" x="600" y="342">full_name</text>
  <text class="text" x="600" y="372">email</text>
  <text class="text" x="600" y="402">account_type</text>
  <text class="text" x="600" y="432">status</text>
  <text class="text" x="600" y="462">preferred_currency</text>

  <rect class="dash" x="1030" y="160" width="320" height="160"/>
  <text class="head" x="1065" y="204">Dashboard Access</text>
  <text class="text" x="1065" y="238">Admin dashboard</text>
  <text class="text" x="1065" y="266">Supplier dashboard</text>
  <text class="text" x="1065" y="294">Small business dashboard</text>

  <rect class="dash" x="1030" y="440" width="320" height="160"/>
  <text class="head" x="1065" y="484">Security Rules</text>
  <text class="text" x="1065" y="518">Row-level security</text>
  <text class="text" x="1065" y="546">Owner-based access</text>
  <text class="text" x="1065" y="574">Admin permissions</text>

  <rect class="box" x="410" y="625" width="620" height="95"/>
  <text class="head" x="450" y="663">Account Identification</text>
  <text class="text" x="450" y="693">The same UID connects authentication, profile information, and protected dashboard access.</text>

  <path class="line" d="M430 365 L560 365"/>
  <path class="line" d="M900 350 C970 300 990 255 1030 240"/>
  <path class="line" d="M900 420 C970 470 990 510 1030 520"/>
  <path class="line" d="M730 500 L730 625"/>
  <rect class="tag" x="635" y="540" width="190" height="36"/>
  <text class="tagText" x="668" y="563">Section 5.11</text>
</svg>
